<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>#Risefor65 Poll of the Day</title>
  <style>
    :root{
      --midnight:#2D1B4E;
      --plum:#4A2D7A;
      --lavender:#9B7EC8;
      --rose:#C4829A;
      --pink:#E8C4D0;
      --cream:#FAF0F5;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(-45deg,#2D1B4E,#4A2D7A,#9B7EC8,#C4829A);
      background-size:400% 400%;
      animation:sky 18s ease infinite;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      color:white;
      padding:20px;
    }

    @keyframes sky{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    .poll-card{
      background:rgba(0,0,0,.35);
      border-radius:18px;
      padding:25px;
      width:420px;
      max-width:95%;
      box-shadow:0 12px 40px rgba(0,0,0,.18);
      overflow:hidden;
    }

    .poll-banner{
      margin:-25px -25px 18px;
      padding:14px 18px;
      background:linear-gradient(90deg,var(--lavender),var(--rose));
      color:white;
      text-align:center;
      font-weight:700;
      letter-spacing:.3px;
      font-size:18px;
      border-radius:18px 18px 0 0;
      box-shadow:inset 0 -1px 0 rgba(255,255,255,.12);
    }

    h2{
      margin-top:0;
      margin-bottom:16px;
      font-weight:600;
      line-height:1.3;
    }

    .option{
      position:relative;
      background:rgba(255,255,255,.12);
      border-radius:10px;
      margin:8px 0;
      padding:12px 14px;
      cursor:pointer;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      transition:background .2s ease, transform .15s ease, outline-color .2s ease;
      outline:2px solid transparent;
    }

    .option:hover{
      background:rgba(255,255,255,.18);
      transform:translateY(-1px);
    }

    .option.selected{
      outline:2px solid rgba(255,255,255,.8);
      background:rgba(255,255,255,.2);
    }

    .fill{
      position:absolute;
      left:0;
      top:0;
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#9B7EC8,#E8C4D0);
      opacity:.35;
      transition:width .6s ease;
    }

    .option-content{
      position:relative;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      z-index:2;
    }

    .option-label{
      font-size:16px;
    }

    .percent{
      font-size:14px;
      opacity:.95;
      white-space:nowrap;
    }

    .status{
      margin-top:14px;
      font-size:13px;
      opacity:.8;
      line-height:1.5;
    }

    .helper{
      margin-top:8px;
      font-size:12px;
      opacity:.72;
    }
  </style>
</head>
<body>
  <div class="poll-card">
    <div class="poll-banner">#Risefor65 Poll of the Day</div>
    <h2>When you think about what you're grateful for, what pops into your head first?</h2>

    <div class="option" data-index="0">
      <div class="fill"></div>
      <div class="option-content">
        <span class="option-label">My loved ones</span>
        <span class="percent">0%</span>
      </div>
    </div>

    <div class="option" data-index="1">
      <div class="fill"></div>
      <div class="option-content">
        <span class="option-label">My health</span>
        <span class="percent">0%</span>
      </div>
    </div>

    <div class="option" data-index="2">
      <div class="fill"></div>
      <div class="option-content">
        <span class="option-label">My career/education</span>
        <span class="percent">0%</span>
      </div>
    </div>

    <div class="option" data-index="3">
      <div class="fill"></div>
      <div class="option-content">
        <span class="option-label">Daily comforts (home, food, amenities, etc)</span>
        <span class="percent">0%</span>
      </div>
    </div>

    <div class="option" data-index="4">
      <div class="fill"></div>
      <div class="option-content">
        <span class="option-label">My personal/spiritual growth</span>
        <span class="percent">0%</span>
      </div>
    </div>

    <div class="status" id="total">Loading...</div>
    <div class="helper">Select a single option</div>
  </div>

  <script>
    const POLL_ID = "risefor65-poll-day-gratitude-1";
    const STORAGE_KEY = `pollChoice:${POLL_ID}`;
    const API_URL = `/.netlify/functions/poll?poll=${encodeURIComponent(POLL_ID)}`;

    const options = document.querySelectorAll(".option");
    const percents = document.querySelectorAll(".percent");
    const fills = document.querySelectorAll(".fill");
    const totalEl = document.getElementById("total");

    let votes = [0, 0, 0, 0, 0];
    let selectedOption = readSavedChoice();
    let isSubmitting = false;

    function readSavedChoice() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw === null) return null;
      const parsed = Number(raw);
      return Number.isInteger(parsed) ? parsed : null;
    }

    async function loadResults() {
      totalEl.textContent = "Loading...";
      try {
        const res = await fetch(API_URL, { cache: "no-store" });
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        const data = await res.json();
        votes = Array.isArray(data.votes) ? data.votes : votes;
        render();
      } catch (err) {
        totalEl.textContent = "Could not load live results";
        console.error("Load error:", err);
      }
    }

    async function vote(i) {
      if (isSubmitting) return;
      isSubmitting = true;

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            option: i,
            previousOption: selectedOption
          })
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        votes = Array.isArray(data.votes) ? data.votes : votes;
        selectedOption = i;
        localStorage.setItem(STORAGE_KEY, String(i));
        render();
      } catch (err) {
        console.error("Vote error:", err);
        alert("Could not save vote. Please try again.");
      } finally {
        isSubmitting = false;
      }
    }

    function render() {
      const total = votes.reduce((a, b) => a + b, 0);

      votes.forEach((v, i) => {
        const pct = total ? Math.round((v / total) * 100) : 0;
        percents[i].textContent = pct + "%";
        fills[i].style.width = pct + "%";
        options[i].classList.toggle("selected", selectedOption === i);
      });

      totalEl.textContent = `${total} vote${total === 1 ? "" : "s"}`;
    }

    options.forEach((option) => {
      option.addEventListener("click", () => {
        const index = Number(option.dataset.index);
        if (Number.isInteger(index)) {
          vote(index);
        }
      });
    });

    loadResults();
    setInterval(loadResults, 10000);
  </script>
</body>
</html>
